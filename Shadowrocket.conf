hijack-dns = 8.8.8.8:53,8.8.4.4:53

block-quic = all-proxy

[Proxy]

[Proxy Group]
# > 核心策略组（已完全对齐 Loon）
节点选择 = select, ⚡ 自动选择, PROXY, DIRECT, REJECT, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点
国内分流 = select, DIRECT, 节点选择
兜底分流 = select, 节点选择, DIRECT, PROXY

# > 节点筛选（按需自动测速，补齐了新加坡节点）
⚡ 自动选择 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5
🇭🇰 香港节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,policy-regex-filter=🇭🇰|HK|Hong|香港|深港
🇹🇼 台湾节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,policy-regex-filter=🇹🇼|TW|Taiwan|台湾|台北
🇯🇵 日本节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,policy-regex-filter=🇯🇵|JP|Japan|日本|东京|大阪
🇸🇬 新加坡节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,policy-regex-filter=🇸🇬|SG|Singapore|新加坡|狮城
🇺🇸 美国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,policy-regex-filter=🇺🇸|US|America|美国|洛杉矶

